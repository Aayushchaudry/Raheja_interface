customHeaders:
  - pattern: '/index.html'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=0, must-revalidate'
  - pattern: '/assets/*.js'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/assets/*.css'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/assets/videos/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=2592000'
  - pattern: '/assets/audio/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=2592000'
  - pattern: '/assets/images/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=2592000'
  - pattern: '/assets/fonts/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
